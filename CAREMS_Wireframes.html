<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CAREMS Wireframes</title>
<style>
  :root{--line:#94a3b8;--bg:#f8fafc;--box:#ffffff;--text:#334155;--muted:#94a3b8;--accent:#475569;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Courier New',monospace;background:var(--bg);color:var(--text);}
  .tabs{display:flex;gap:0;border-bottom:2px solid var(--accent);background:#e2e8f0;overflow-x:auto;}
  .tab{padding:14px 20px;cursor:pointer;font-size:13px;font-weight:bold;letter-spacing:.5px;border-right:1px solid var(--line);white-space:nowrap;}
  .tab.active{background:var(--bg);border-bottom:3px solid var(--accent);}
  .screen{display:none;padding:24px;max-width:1100px;margin:0 auto;}
  .screen.active{display:block;}
  .title{font-size:12px;color:var(--muted);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px;}
  .box{border:2px dashed var(--line);background:var(--box);border-radius:2px;padding:12px;}
  .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .grid{display:grid;gap:14px;}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}
  .kpi{height:70px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;}
  .row{display:flex;gap:14px;margin-bottom:14px;}
  .col{flex:1;}
  .btn{display:inline-block;border:2px solid var(--accent);padding:6px 14px;font-size:11px;margin:4px 6px 0 0;background:#fff;}
  .table-mock td, .table-mock th{border:1px solid var(--line);padding:6px 8px;font-size:11px;text-align:left;}
  .table-mock{width:100%;border-collapse:collapse;}
  .nav{background:var(--accent);color:#fff;padding:10px 16px;font-size:12px;letter-spacing:1px;margin-bottom:16px;}
  .side{width:140px;}
  .placeholder-text{color:var(--muted);font-size:11px;}
  .alert-box{border:2px dashed #b45309;background:#fffbeb;padding:8px;font-size:11px;margin-bottom:8px;}
  .acc-layout{display:flex;gap:0;align-items:flex-start;}
  .acc-side{width:220px;flex-shrink:0;background:#fff;border:2px dashed var(--line);border-right:none;padding:0;}
  .acc-main{flex:1;min-width:0;border:2px dashed var(--line);border-left:none;padding:20px;}
  .acc-nav-item{padding:10px 16px;font-size:12px;font-weight:bold;letter-spacing:.3px;cursor:default;border-bottom:1px solid #e2e8f0;}
  .acc-nav-item.selected{background:var(--accent);color:#fff;position:relative;}
  .acc-nav-item.selected::before{content:'▸';position:absolute;left:4px;}
  .acc-nav-section{padding:10px 16px 4px;font-size:10px;font-weight:bold;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid #e2e8f0;background:#f1f5f9;}
  .acc-nav-child{padding:9px 16px 9px 30px;font-size:11.5px;border-bottom:1px solid #e2e8f0;}
  .acc-nav-child.selected{background:var(--accent);color:#fff;font-weight:bold;position:relative;}
  .acc-nav-child.selected::before{content:'▸';position:absolute;left:14px;}
  .breadcrumb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
</style>
</head>
<body>

<div class="tabs" id="tabs"></div>
<div id="screens"></div>

const tabsEl = document.getElementById('tabs');
const screensEl = document.getElementById('screens');
roles.forEach((r, i) => {
  const tab = document.createElement('div');
  tab.className = 'tab' + (i===0?' active':'');
  tab.textContent = r.name;
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('screen-'+r.id).classList.add('active');
  };
  tabsEl.appendChild(tab);

  const screen = document.createElement('div');
  screen.className = 'screen' + (i===0?' active':'');
  screen.id = 'screen-'+r.id;
  screen.innerHTML = r.build();
  screensEl.appendChild(screen);
});

</html>
